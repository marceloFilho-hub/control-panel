# ═══════════════════════════════════════════════════════════════
# HIDRA CONTROL PLANE — Configuração de automações
# ═══════════════════════════════════════════════════════════════
#
# ARQUIVO GERENCIADO PELA UI
# Edite pelo dashboard em http://localhost:9000 → aba "Configurar".
#
# Apps marcados com _source: pasta vêm da pasta apps_executaveis/
# e são descobertos automaticamente — solte um .vbs/.exe/.bat/.ps1
# lá e ele aparece aqui.
#
# Slots:
#   heavy  → Semaphore(1) — máximo 1 job pesado por vez
#   light  → Semaphore(3) — até 3 jobs leves em paralelo
#   always → Serviço permanente com auto-restart
#
# Schedules:
#   "manual" → roda uma vez ao ativar (botão ▶)
#   "loop"   → roda, aguarda pause_between segundos, repete
#
# O orquestrador NÃO cuida de horário (cron). Ele cuida de:
#   - tempo entre rodagens (pause_between)
#   - fila por slot (heavy=1, light=3)
#   - fila por memória (aguarda RAM liberar antes de iniciar)
# ═══════════════════════════════════════════════════════════════

apps:
  exemplo_hello:
    slot: light
    cwd: C:/Users/marcelo.lsantos_bhub/Documents/automacoes/control_panel/apps_executaveis
    cmd: cscript //nologo //B "C:\Users\marcelo.lsantos_bhub\Documents\automacoes\control_panel\apps_executaveis\exemplo_hello.vbs"
    schedule: manual
    max_ram_mb: 512
    timeout: 600
    _source: pasta
  monitor_contribuintes:
    slot: light
    cwd: C:/Users/marcelo.lsantos_bhub/Documents/automacoes/cadastro_contribuinte
    cmd: cscript //nologo //B "C:\Users\marcelo.lsantos_bhub\Documents\automacoes\cadastro_contribuinte\deploy\iniciar_silencioso.vbs"
      //nologo
    schedule: manual
    max_ram_mb: 512
    timeout: 600
    _source: pasta
alerts:
  telegram_bot_token: ${TELEGRAM_BOT_TOKEN}
  telegram_chat_id: ${TELEGRAM_CHAT_ID}
  on_failure: true
  on_timeout: true
  on_ram_exceeded: true
settings:
  log_dir: logs/
  log_rotation: 10 MB
  log_retention: 30
  heavy_slots: 1
  light_slots: 3
  ram_safety_margin_mb: 512
