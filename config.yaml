alerts:
  telegram_bot_token: ${TELEGRAM_BOT_TOKEN}
  telegram_chat_id: ${TELEGRAM_CHAT_ID}
  on_failure: true
  on_timeout: true
  on_ram_exceeded: true
settings:
  log_dir: logs/
  log_rotation: 10 MB
  log_retention: 30
  heavy_slots: 1
  light_slots: 3
  ram_safety_margin_mb: 512
